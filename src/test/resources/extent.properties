# Reporter
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/ExtentReport.html

# Appearance
extent.reporter.spark.theme=dark
extent.reporter.spark.documentTitle=MZOne MVSales Automation Report
extent.reporter.spark.reportName=MZOne Test Execution Results
extent.reporter.spark.timelineEnabled=true

# Screenshots
extent.reporter.spark.base64imagesrc=true

# Date Format
extent.reporter.spark.dateFormat=yyyy-MM-dd HH:mm:ss

# View Order
extent.reporter.spark.viewOrder=dashboard,test,category,exception,author,device,log